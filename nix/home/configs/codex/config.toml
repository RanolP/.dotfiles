# OpenAI Codex CLI config — settings only (managed by this repo).
# On activation, home-manager writes ~/.codex/config.toml = this file plus the
# [projects.*] trust blocks from the uncommitted ~/.codex/config.local.toml.
# Trust entries are machine-specific absolute paths and stay out of git; add
# them to config.local.toml, not here. Edit this file, then darwin-rebuild.

service_tier = "fast"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_verbosity = "low"
plan_mode_reasoning_effort = "xhigh"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
file_opener = "vscode"
personality = "pragmatic"
check_for_update_on_startup = false
commit_attribution = "Codex (gpt-5.5) <noreply@openai.com>"
project_doc_fallback_filenames = ["CLAUDE.md"]

[sandbox_workspace_write]
network_access = true

[tools]
web_search = true
view_image = true

[features]
memories = true
codex_git_commit = true
undo = true
prevent_idle_sleep = true
hooks = true

[analytics]
enabled = false

[feedback]
enabled = false

[history]
max_bytes = 104857600

[agents]
max_depth = 2

[tui]
vim_mode_default = true
notifications = true
notification_condition = "always"
alternate_screen = "always"
status_line = [
  "current-dir",
  "git-branch",
  "model-with-reasoning",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
]

[[skills.config]]
path = "~/.claude/skills"
enabled = true

# Restrict `git push` to claude/* branches (ported from the Claude PreToolUse
# guard; reuses the same script). Denies via permissionDecision; the deny path
# uses Codex's documented hook output format.
[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "python3 \"$HOME/.codex/hooks/git-push-guard.py\""
timeout = 30
statusMessage = "Checking git push target"

[plugins."github@openai-curated"]
enabled = true
