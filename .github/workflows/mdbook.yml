name: Deploy mdbook to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory /usr/local/bin

      - name: Build
        run: cd docs && mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      ACTIONS_STEP_DEBUG: true
      ACTIONS_RUNNER_DEBUG: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Dump Pages deployment status on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::group::Pages config"
          gh api "repos/${GITHUB_REPOSITORY}/pages" || true
          echo "::endgroup::"
          echo "::group::Latest deployment statuses for ${GITHUB_SHA}"
          dep=$(gh api "repos/${GITHUB_REPOSITORY}/deployments?sha=${GITHUB_SHA}&environment=github-pages" --jq '.[0].id')
          echo "deployment id: ${dep}"
          gh api "repos/${GITHUB_REPOSITORY}/deployments/${dep}/statuses" \
            --jq '.[] | {state, description, log_url, created_at}' || true
          echo "::endgroup::"
